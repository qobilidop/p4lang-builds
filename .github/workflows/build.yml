name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        image: [p4c, bmv2]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*

  merge:
    needs: build
    strategy:
      matrix:
        image: [p4c, bmv2]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive tag from Dockerfile pin
        id: ver
        run: |
          version=$(grep -oP '^ARG VERSION=\K.*' "${{ matrix.image }}/Dockerfile")
          echo "tag=${version}-noble" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Immutability: a published tag is never re-pushed. An existing tag is not an
      # error — the other image may have been bumped independently — it just
      # means there is nothing to publish for this one.
      - name: Check tag immutability
        id: exists
        run: |
          if docker manifest inspect "${IMAGE}:${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "::notice::tag ${{ steps.ver.outputs.tag }} already published; skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        if: steps.exists.outputs.exists == 'false'
        with:
          pattern: digest-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create multi-arch manifest
        if: steps.exists.outputs.exists == 'false'
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ steps.ver.outputs.tag }}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}@$(cat /tmp/digests/amd64)" \
            "${IMAGE}@$(cat /tmp/digests/arm64)"

      - name: Inspect result
        run: docker buildx imagetools inspect "${IMAGE}:${{ steps.ver.outputs.tag }}"
