name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}/toolchain

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive tag from Dockerfile pins
        id: ver
        run: |
          p4c=$(grep -oP '^ARG P4C_VERSION=\K.*' Dockerfile)
          bmv2=$(grep -oP '^ARG BMV2_VERSION=\K.*' Dockerfile)
          echo "tag=${p4c}-${bmv2}-noble" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce tag immutability
        run: |
          if docker manifest inspect "${IMAGE}:${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::tag ${{ steps.ver.outputs.tag }} already exists; bump the version ARGs"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          merge-multiple: true

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ steps.ver.outputs.tag }}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}@$(cat /tmp/digests/amd64)" \
            "${IMAGE}@$(cat /tmp/digests/arm64)"

      - name: Inspect result
        run: docker buildx imagetools inspect "${IMAGE}:${{ steps.ver.outputs.tag }}"
